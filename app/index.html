<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Learn with Ayush - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-sys-color-primary: #fbbf24; --bg: #0b0e14; }
        body { 
            background: var(--bg); 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Android Ripple-like effect */
        .btn-active:active { transform: scale(0.96); opacity: 0.8; }
        
        /* Mobile Card Styling */
        .course-card {
            background: #161b22;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        /* Bottom Sheet Simulation */
        .bottom-sheet {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bottom-sheet.active { transform: translateY(0); }

        /* Video Responsive Hack */
        .aspect-video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .aspect-video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <div class="h-6 w-full bg-slate-950"></div>

    <header class="px-6 py-4 flex flex-col gap-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-400 rounded-2xl flex items-center justify-center text-black font-black shadow-lg">A</div>
                <h1 class="font-extrabold text-lg tracking-tight">LEARN WITH AYUSH</h1>
            </div>
            <button class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/></svg>
            </button>
        </div>
        
        <div class="relative">
            <input type="text" id="searchInput" onkeyup="searchCourses()" placeholder="Search your courses..." 
                   class="w-full bg-slate-800/50 border-none rounded-2xl py-4 pl-12 pr-4 text-sm focus:ring-2 focus:ring-yellow-400/50 transition-all text-white placeholder:text-slate-500">
            <div class="absolute inset-y-0 left-4 flex items-center">
                <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </div>
    </header>

    <main id="dashboard" class="px-6 space-y-8 mt-4 animate-fade">
        <div id="courseSections" class="space-y-10">
            <section>
                <h3 class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-4 ml-1">Featured Pathways</h3>
                <div id="courseGrid" class="space-y-6"></div>
            </section>
        </div>
    </main>

    <div id="player" class="fixed inset-0 bg-slate-950 z-[60] hidden flex flex-col">
        <div class="p-4 flex items-center gap-4 border-b border-white/5 bg-slate-900/50">
            <button onclick="closePlayer()" class="p-2 -ml-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2 id="playerHeaderTitle" class="font-bold truncate text-sm">Course Title</h2>
        </div>
        
        <div class="aspect-video-container bg-black">
            <iframe id="vidFrame" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <div>
                <h2 id="vidTitle" class="text-xl font-bold">Lesson Title</h2>
                <p id="vidDesc" class="text-slate-400 text-sm mt-2 leading-relaxed"></p>
            </div>
            <hr class="border-white/5">
            <div>
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Course Content</h3>
                <div id="lessonList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/80 backdrop-blur-xl border-t border-white/5 px-8 py-3 flex justify-between items-center z-50">
        <div class="flex flex-col items-center gap-1 text-yellow-400">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[10px] font-bold">Home</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-slate-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke-width="2"/></svg>
            <span class="text-[10px] font-bold">Library</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-slate-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-width="2"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"/></svg>
            <span class="text-[10px] font-bold">Settings</span>
        </div>
    </nav>

    <div id="authOverlay" class="fixed inset-0 bg-black/80 z-[100] hidden items-end" onclick="closeModal()">
        <div id="authSheet" class="bottom-sheet w-full bg-slate-900 rounded-t-[40px] p-8 space-y-6" onclick="event.stopPropagation()">
            <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-2"></div>
            <div class="text-center">
                <h3 class="text-2xl font-black mb-2">Premium Access</h3>
                <p class="text-slate-400 text-sm">Join the masterclass via WhatsApp.</p>
            </div>
            
            <a id="waBtn" href="#" class="btn-active flex items-center justify-center gap-3 w-full bg-[#25D366] text-white py-4 rounded-2xl font-bold shadow-lg shadow-green-500/10">
                Contact for Access
            </a>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <input id="authCode" type="tel" placeholder="Enter Access Code" 
                       class="w-full bg-slate-950 border border-white/10 rounded-2xl py-4 text-center text-xl font-mono tracking-widest outline-none focus:border-yellow-400">
                <button onclick="unlockCourse()" class="btn-active w-full bg-yellow-400 text-black py-4 rounded-2xl font-black uppercase text-sm">Verify & Unlock</button>
            </div>
        </div>
    </div>

    <script>
        const courses = [
            { id: "free-1", type: "free", title: "Adobe Photoshop Basic", desc: "Master layers and professional imaging tools.", videoId: "0Iw8ICnqbbw" },
            { id: "free-2", type: "free", title: "WordPress Core", desc: "Build professional websites without writing code.", videoId: "xvhor_4NAlA" },
            { id: "paid-1", type: "paid", title: "Backend Development", desc: "Master PHP and MySQL architecture.", price: 2500, lessons: [{ title: "PHP Basics", videoId: "1PnVor36_40" }, { title: "DB Design", videoId: "3_99vBvL9Yc" }] },
            { id: "paid-2", type: "paid", title: "Kotlin Mobile Masterclass", desc: "Build native Android apps with Compose.", price: 4000, lessons: [{ title: "Intro to Kotlin", videoId: "dQw4w9WgXcQ" }] }
        ];

        let activeCourse = null;

        function renderLibrary(filter = "") {
            const grid = document.getElementById('courseGrid');
            grid.innerHTML = "";
            
            courses.filter(c => c.title.toLowerCase().includes(filter.toLowerCase())).forEach(c => {
                const isPaid = c.type === "paid";
                grid.innerHTML += `
                    <div class="course-card p-6" onclick="${isPaid ? `initAuth('${c.id}')` : `playFree('${c.id}')`}">
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${isPaid ? 'bg-yellow-400/10 text-yellow-400' : 'bg-blue-400/10 text-blue-400'}">
                                ${isPaid ? 'Premium' : 'Free Course'}
                            </span>
                            ${isPaid ? `<span class="font-bold text-yellow-400">Rs. ${c.price}</span>` : ''}
                        </div>
                        <h3 class="text-xl font-bold mb-2">${c.title}</h3>
                        <p class="text-slate-400 text-sm line-clamp-2 mb-6">${c.desc}</p>
                        <div class="flex items-center gap-2 text-yellow-400 text-xs font-bold uppercase tracking-widest">
                            <span>${isPaid ? 'Enroll Now' : 'Watch Now'}</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3"/></svg>
                        </div>
                    </div>`;
            });
        }

        function playFree(id) {
            const course = courses.find(c => c.id === id);
            startPlayer(course.title, [{ title: "Full Tutorial", videoId: course.videoId }], course.desc);
        }

        function initAuth(id) {
            activeCourse = courses.find(c => c.id === id);
            const msg = encodeURIComponent(`Hi Ayush, I want to buy the "${activeCourse.title}" course.`);
            document.getElementById('waBtn').href = `https://wa.me/9779804363914?text=${msg}`;
            
            const overlay = document.getElementById('authOverlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => document.getElementById('authSheet').classList.add('active'), 10);
        }

        function closeModal() {
            document.getElementById('authSheet').classList.remove('active');
            setTimeout(() => document.getElementById('authOverlay').classList.add('hidden'), 300);
        }

        function unlockCourse() {
            const val = document.getElementById('authCode').value;
            if (val === "0506" || (parseInt(val) >= 2002 && parseInt(val) <= 3000)) {
                closeModal();
                startPlayer(activeCourse.title, activeCourse.lessons, activeCourse.desc);
            } else {
                alert("Invalid Access Code");
            }
        }

        function startPlayer(title, lessons, desc) {
            document.getElementById('player').classList.remove('hidden');
            document.getElementById('playerHeaderTitle').innerText = title;
            document.getElementById('vidDesc').innerText = desc;
            
            const list = document.getElementById('lessonList');
            list.innerHTML = "";
            lessons.forEach((l, i) => {
                list.innerHTML += `
                    <button onclick="switchVideo('${l.videoId}', '${l.title}')" class="btn-active w-full flex items-center gap-4 p-4 rounded-2xl bg-white/5 text-left">
                        <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-[10px] font-bold">${i+1}</div>
                        <span class="text-sm font-medium flex-1">${l.title}</span>
                    </button>`;
            });
            switchVideo(lessons[0].videoId, lessons[0].title);
        }

        function switchVideo(id, title) {
            document.getElementById('vidFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1`;
            document.getElementById('vidTitle').innerText = title;
        }

        function closePlayer() {
            document.getElementById('player').classList.add('hidden');
            document.getElementById('vidFrame').src = "";
        }

        function searchCourses() {
            renderLibrary(document.getElementById('searchInput').value);
        }

        renderLibrary();
    </script>
</body>
</html>
